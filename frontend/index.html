<!DOCTYPE html>
<html>

<head>

    <!-- page ko title -->
    <title>Product Manager</title>
    <style>
        /* #product-list
        {
            display: grid;
            grid-template-columns: 200px 200px 200px;
            background-color: red;
        } */
        /* card design  */
        .card {
            border: 1px solid black;
            padding: 15px;
            margin: 10px;
            width: 200px;
        }
    </style>

</head>

<body>

    <!-- heading -->
    <h1>Products</h1>
    <input type="text" id="nameInput" placeholder="Product name">
    <input type="number" id="priceInput" placeholder="Price">
    <button onclick="addProduct()">Add Product</button>

    <!-- products show garne empty div -->
    <div id="product-list"></div>

    <script>

        // backend bata data line function
        async function getProducts() {

            // backend ko /products API ma request pathaune
            const response = await fetch("http://localhost:3000/products");

            // JSON data lai JavaScript object ma convert garne
            const data = await response.json();

            renderProducts(data)


        }

        //New Product add garne function
        async function addProduct() {
            // input bata value line
            const nameInput = document.getElementById('nameInput').value;
            // input bata price line ra number ma convert garne
            const priceInput = Number(document.getElementById('priceInput').value);
            console.log(nameInput);
            console.log(priceInput);

            //empty check
            if (!nameInput && !priceInput) {
                alert("Please fill all fields")
                // function stop garne
                return;
            }

            const response = await fetch('http://localhost:3000/products', {
                method: "POST", //specify the method
                headers: {
                    "Content-type": "application/json",
                },
                // Backend ma probably name ra price expect garirako cha.
                //backend ma j key value pair huncha tyai lekhne jasto name ra price
                body: JSON.stringify({
                    name: nameInput,
                    price: priceInput
                })

            })


            // response = delivery box
            // response.json() = box vitra ko real product data
            // console.log(response);
            const data = await response.json();
            console.log(data)
            addOneProductToPage(data);
            // div select garne
            //     const list = document.getElementById('product-list');

            //     list.innerHTML += `

            //        <div class="card">
            //        <h3>${nameInput}</h3>
            //        <p> ${priceInput}</p>
            //        </div>
            // `;

            // Clear input after add
            document.getElementById('nameInput').value = "";
            document.getElementById('priceInput').value = "";



        }



        // function run garne
        getProducts();


        function renderProducts(data) {
            // div select garne
            const list = document.getElementById('product-list');
            console.log(list);
            // list.innerHTML = "hello"
            // products one by one loop garne
            // old all cards remove
            list.innerHTML = ""  //clears old cards
            data.forEach((product, index) => {

                // page ma product name show garne
                // innerHTML +=→ page ma add gardai jancha
                // card create garne
                list.innerHTML += `
              
               <div class="card">
               <p>${product.name}</p>
               <p> ${product.price}</p>
               <button onClick="deleteProduct(${product.id})"> Delete</button>
               </div>
        `;

            });

        }



        async function addOneProductToPage(data) {
            console.log('data' + data)
            const list = document.getElementById("product-list");

            list.innerHTML += `
        <div class="card">
            <p>${data.name}</p>
            <p>${data.price}</p>
            <button onClick="deleteProduct(${data.id})"> Delete</button>
        </div>
    `;
        }


        async function deleteProduct(id) {
            console.log(id);
            const response =await fetch(`http://localhost:3000/products/${id}`, {
                method: "DELETE"
            });
            //hello
            const data= await response.json();
            renderProducts(data);
        }
    </script>

</body>

</html>
