<!DOCTYPE html>
<html>

<head>

    <!-- page ko title -->
    <title>Product Manager</title>
    <style>
        /* #product-list
        {
            display: grid;
            grid-template-columns: 200px 200px 200px;
            background-color: red;
        } */
        /* card design  */
        .card
        {
         border: 1px solid black;
         padding: 15px;
         margin: 10px;
         width: 200px;
        }
    </style>

</head>

<body>

    <!-- heading -->
    <h1>Products</h1>

    <!-- products show garne empty div -->
    <div id="product-list"></div>

    <script>

        // backend bata data line function
        async function getProducts() {

            // backend ko /products API ma request pathaune
            const response = await fetch("http://localhost:3000/products");

            // JSON data lai JavaScript object ma convert garne
            const data = await response.json();

            // div select garne
            const list = document.getElementById('product-list');
            console.log(list);
            // list.innerHTML = "hello"
            // products one by one loop garne
            data.forEach((product) => {

                // page ma product name show garne
                // innerHTML +=→ page ma add gardai jancha
                // card create garne
                list.innerHTML += `
              
               <div class="card">
               <p>${product.name}</p>
               <p> ${product.price}</p>
               </div>
        `;

            });

        }

        // function run garne
        getProducts();

    </script>

</body>

</html>
